<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <style>
        ul > li{
            margin: 0;
            padding: 0;
            color: maroon;
            background-color: aqua;
        }

    </style>
    
</head>
<body>
    <p>Targets elements that are direct children (one level down)</p>
    <h1>Heading 1</h1>

    <ul>
        <li>Laptop</li>
        <li>Tablet</li>
        <li>iPhone</li>
    </ul>
   
    
</body>
</html>
