<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Selector</title>
    <style>
        .highlight {
            Background-color: yellow;
            color: red;
            font-weight: bold;
        }
    </style>

</head>
<body>
    <p class="highlight">
        Paragraph 1
    </p>
    <p>Paragraph 2</p>
    
</body>
</html>
