<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag</title>
</head>

<body>
    <!-- <p>Video Tag</p>

     <!-- Video format : MP4, WebM, Ogg  -->

     <!-- width & height -->
    <video src="Car video.mp4" width="320" height="240" controls>
        Your browser does not support the video tag.
    </video>

     <!-- W/o controls the video appears but the user cannot play it. 
     JavaScript can start playing the video -->


    <video src="Car video.webm" width="320" height="240" controls>
        Your browser does not support the video tag.
    </video> 


    <!-- autoplay -->
    <video src="Car video.mp4" width="880" height="520" autoplay controls>
        Your browser does not support the video tag
    </video>


</body>

</html>
