<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Audio Tag</title>
</head>

<body>
    <p>1.</p><audio src="audio sample.mp3" controls>Your browser does not support the audio tag.</audio>

    <!-- Audio formats
     1.MP3
     2.OGG
     3.WAV
      -->

    <!-- Autoplay -->
     <p>2.</p>
    <audio src="audio sample.mp3" autoplay controls>Your browser does not support the audio tag</audio>

    <!-- Muted  -->
     <p>3.</p>
    <audio src="audio sample.mp3" autoplay muted controls>Your browser does not support the audio tag</audio>

    <!-- Loop -->
     <p>4.</p>
    <audio src="audio sample.mp3" loop controls>Your browser does not support the audio tag</audio>

    <!-- Preload -->
    <!-- none: Don't preload; load only when user starts playing -->
    <!-- metadata: Load only information like duration, dimensions etc -->
    <!-- auto: Automatic: Browser load video immediately -->
     <p>5.</p>
    <audio src="audio sample.mp3" preload="none" controls>
        Your browser does not support the audio tag
    </audio>
</body>

</html>
