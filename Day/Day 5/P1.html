<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <style>
        a[href^="https"]{
            color: green;
            background-color: rosybrown;
        }
       input[type="text"]{
            border: 2px solid #ec122c
        }
    </style>
</head>
<body>
    <p>Attribute Selector: select based on HTML attributes and their values</p>
    <h1>Heading 1</h1>
    <a href="https://www.google.com">Take me to Google</a><br><br>
    <input type="text" name="" id="">
</body>
</html>
