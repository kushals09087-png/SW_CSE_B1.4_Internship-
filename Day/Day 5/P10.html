<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Styling</title>
    <style>
        h1{
            font-weight:bold;
            font-family: cursive;
        }
        em{
            font-style: oblique;
        }
        cite{
            font-style: italic;
        }
        span{
            font: italic bold 15px arial, sans-serif;/* font shorthand*/
        }
    </style>
</head>
<body>
    <!-- <p>Text Styling: lets us control how text looks and behaves on a webpage.<br>
       Size, Font, Alignment, spacing and many more things.<br><br>
       1.Font Properties:<br><br>
       >>font-family<br>
       >>font-size<br>
       >>font-weight<br>
       >>font-style<br>
       >>font-shorthand<br> 
    </p> -->
    <h1>Font Styling</h1>
    <span>font shorthand representing line.</span>
    <p>lets us control <em> how text looks and behaves</em> <cite> on a webpage</cite></p>

    
</body>
</html>
