<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL & HSLA colors</title>
</head>
<style>
    p{
        /*  HSL colors: Hue (0-360) [0:red,120:green,240:blue], 
        Saturation (0-100%) how vivd or gray color is
        , Lightness (0-100%) how light or dark the color is going to be */
        color: hsl(155, 98%, 49%);
        font-size: large;
    }
    h1{
        /*  0-1 for alpha(Transparency) */
        color: hsla(166, 100%, 50%, 0.594);
    }

</style>
<body>
    <p>Named color</p>
    <h1>Heading 1</h1>
    
</body>
</html>
