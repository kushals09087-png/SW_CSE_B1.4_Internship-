<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-class Selector</title>
    <style>
        a:hover{
            color: brown;
            background-color: chartreuse;
            text-decoration: underline;
        }
       input:focus{
            outline: 4px solid #1d12ec
        }
    </style>
</head>
<body>
    <p>Pseudo-class Selector: select based on the state of an element(hovered, focused, first child)</p>
    <h1>Heading 1</h1>
    <a href="https://www.google.com">Take me to Google</a><br><br>
    <input type="text" name="" id="">
</body>
</html>
