<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB & RGBA colors</title>
</head>
<style>
    p{
        /* 0-255 */
        color: rgb(9, 152, 218);
    }
    h1{
        /* 0-255 for RGB, 0-1 for alpha(Transparency) */
        color: rgba(3, 134, 195, 0.594);
    }

</style>
<body>
    <p>Named color</p>
    <h1>Heading 1</h1>
    
</body>
</html>
