<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>

<body>
    <p>HTML Tables</p>
    <p>tr: table row<br>
        td: table data<br>
        th: table header
    </p>
    <table border="1">
        <caption>Monthly Savings report</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>June</td>
            <td>150000</td>
        </tr>
        <tr>
            <td>July</td>
            <td>275000</td>
        </tr>
    </table>

    <table border="1">
        <caption>Sales data</caption>
        <thead>
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>June</td>
                <td>500000</td>
            </tr>
            <tr>
                <td>July</td>
                <td>750000</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>1250000</td>
            </tr>
    </table>

</body>

</html>
