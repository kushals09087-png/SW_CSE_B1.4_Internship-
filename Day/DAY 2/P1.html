<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- src:source , alt:alternative text | image tag is a self closing tag and doesnt require</img> -->
    <img src="i1.jpeg" alt="Could not find image" width="200px" height="100px">
    <!-- tool tip -->
    <!-- <img src="i1.jpeg" alt="Could not find image" title="Image of a BMW car"> -->
    <!-- common attributes & variations -->
    <img src="images/i2.jpg" alt="Could not find image"
    style="width: 200px; height: 100px; border-radius: 10%; border: 2px solid #cd2323;">
</body>

</html>
